<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>YouTube Recommendation Filter</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 350px;
      padding: 15px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a1a;
      color: #ffffff;
    }
    
    h1 {
      font-size: 18px;
      margin-bottom: 15px;
      color: #ff0000;
    }
    
    .section {
      margin-bottom: 20px;
      padding: 10px;
      background: #2a2a2a;
      border-radius: 5px;
    }
    
    .section h2 {
      font-size: 14px;
      margin-bottom: 10px;
      color: #aaaaaa;
    }
    
    .stat {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 13px;
    }
    
    .stat-label {
      color: #aaaaaa;
    }
    
    .stat-value {
      color: #00ff00;
      font-weight: bold;
    }
    
    .toggle {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding: 8px;
      background: #333333;
      border-radius: 3px;
    }
    
    .toggle label {
      font-size: 13px;
      cursor: pointer;
    }
    
    .toggle input[type="checkbox"] {
      width: 40px;
      height: 20px;
      cursor: pointer;
    }
    
    .slider-container {
      margin-bottom: 10px;
    }
    
    .slider-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 5px;
      color: #aaaaaa;
    }
    
    input[type="range"] {
      width: 100%;
      height: 5px;
      background: #444444;
      outline: none;
      border-radius: 5px;
    }
    
    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 15px;
      height: 15px;
      background: #ff0000;
      cursor: pointer;
      border-radius: 50%;
    }
    
    button {
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      background: #ff0000;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      transition: background 0.2s;
    }
    
    button:hover {
      background: #cc0000;
    }
    
    button.secondary {
      background: #333333;
    }
    
    button.secondary:hover {
      background: #444444;
    }
    
    button.danger {
      background: #990000;
    }
    
    button.danger:hover {
      background: #770000;
    }
    
    .status {
      text-align: center;
      padding: 8px;
      margin-top: 10px;
      font-size: 12px;
      color: #00ff00;
      background: #1a3a1a;
      border-radius: 3px;
      display: none;
    }
    
    .status.error {
      color: #ff4444;
      background: #3a1a1a;
    }
  </style>
</head>
<body>
  <h1>🎯 YouTube Filter</h1>
  
  <div class="section">
    <h2>Statistics</h2>
    <div class="stat">
      <span class="stat-label">Videos Filtered:</span>
      <span class="stat-value" id="watchedCount">Loading...</span>
    </div>
    <div class="stat">
      <span class="stat-label">Last Sync:</span>
      <span class="stat-value" id="lastSync">Never</span>
    </div>
  </div>
  
  <div class="section">
    <h2>Settings</h2>
    
    <div class="toggle">
      <label for="hideWatched">Hide Watched Videos</label>
      <input type="checkbox" id="hideWatched" checked>
    </div>
    
    <div class="toggle">
      <label for="boostSubscriptions">Boost Subscriptions</label>
      <input type="checkbox" id="boostSubscriptions" checked>
    </div>
    
    <div class="toggle">
      <label for="enableSync">Auto-Sync History</label>
      <input type="checkbox" id="enableSync" checked>
    </div>
    
    <div class="slider-container">
      <div class="slider-label">
        <span>Watch Threshold:</span>
        <span id="thresholdValue">50%</span>
      </div>
      <input type="range" id="watchThreshold" min="10" max="90" value="50" step="5">
    </div>
  </div>
  
  <div class="section">
    <h2>Actions</h2>
    <button id="syncNow">🔄 Sync Watch History Now</button>
    <button id="openHistory" class="secondary">📜 Open Watch History</button>
    <button id="clearCache" class="danger">🗑️ Clear All Filtered Videos</button>
  </div>
  
  <div class="status" id="status"></div>
  
  <script src="popup.js"></script>
</body>
</html>
